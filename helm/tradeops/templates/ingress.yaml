{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tradeops.fullname" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName | default (printf "%s-tls" (include "tradeops.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Route /api/* directly to the backend — bypasses Next.js entirely in K8s
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "tradeops.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          # All other traffic goes to the Next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tradeops.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
