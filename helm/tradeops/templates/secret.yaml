apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tradeops.fullname" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "tradeops.databaseUrl" . | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secret.anthropicApiKey | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  {{- end }}
