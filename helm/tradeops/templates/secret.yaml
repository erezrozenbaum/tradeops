apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tradeops.fullname" . }}
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "tradeops.databaseUrl" . | quote }}
  SECRET_KEY: {{ .Values.secret.secretKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secret.anthropicApiKey | quote }}
  ALPHA_VANTAGE_API_KEY: {{ .Values.secret.alphaVantageApiKey | quote }}
  SMTP_HOST: {{ .Values.secret.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secret.smtpPort | toString | quote }}
  SMTP_USER: {{ .Values.secret.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secret.smtpPass | quote }}
  ALERT_FROM_EMAIL: {{ .Values.secret.alertFromEmail | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secret.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secret.langfuseSecretKey | quote }}
  LANGFUSE_HOST: {{ .Values.secret.langfuseHost | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  {{- end }}
