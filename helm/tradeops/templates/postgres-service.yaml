{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tradeops.fullname" . }}-postgres
  labels:
    {{- include "tradeops.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  clusterIP: None  # headless service for StatefulSet DNS
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: {{ .Values.postgresql.port }}
      protocol: TCP
      name: postgres
  selector:
    {{- include "tradeops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
