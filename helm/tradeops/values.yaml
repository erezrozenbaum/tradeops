# ─────────────────────────────────────────────────────────────
# TradeOps AI — Helm values
# Override any of these in your own values file:
#   helm install tradeops ./helm/tradeops -f my-values.yaml
# ─────────────────────────────────────────────────────────────

# -- Global image pull policy
imagePullPolicy: IfNotPresent

# ── Backend ──────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/erezrozenbaum/tradeops-backend
    tag: latest
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Liveness / readiness probe path
  healthPath: /api/v1/health
  env:
    ENVIRONMENT: production
    # Whether background APScheduler jobs run inside the backend pod (set false for dedicated worker pods)
    WORKERS_ENABLED: "true"
    # Comma-separated list of allowed CORS origins
    ALLOWED_ORIGINS: "http://localhost:3000"
    # Per-investor AI spend cap over a rolling 30-day window in USD (0 = unlimited)
    AI_MONTHLY_BUDGET_USD: "0.0"
    # OpenTelemetry OTLP gRPC endpoint — leave empty to skip export
    OTEL_EXPORTER_OTLP_ENDPOINT: ""
    # DATABASE_URL, SECRET_KEY, ANTHROPIC_API_KEY, SMTP, and Langfuse are supplied via secret (see below)

# ── Frontend ─────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/erezrozenbaum/tradeops-frontend
    tag: latest
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Redis (bundled — for distributed rate limiting) ──────────
redis:
  # Set enabled: false to use an external Redis and supply REDIS_URL in backend env
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── PostgreSQL (bundled) ─────────────────────────────────────
postgresql:
  # Set enabled: false to use an external database and supply DATABASE_URL in secret
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  port: 5432
  database: tradeops
  user: tradeops
  # password is set in secret.postgresPassword
  storage:
    size: 10Gi
    storageClass: ""   # "" = use cluster default

# ── Secrets (use SealedSecrets, ESO, or Vault in production — never commit real values) ──
secret:
  # PostgreSQL password (also used to build DATABASE_URL when postgresql.enabled=true)
  # MUST be changed from the default for any non-dev deployment
  postgresPassword: "tradeops"
  # App signing secret — used for JWT and session tokens. MUST be a strong random string (≥32 chars)
  secretKey: ""
  # Anthropic API key — required for AI features
  anthropicApiKey: ""
  # Alpha Vantage API key — optional fallback price provider
  alphaVantageApiKey: ""
  # Supply a full DATABASE_URL to use an external database
  # Leave empty when postgresql.enabled=true (auto-composed from above)
  databaseUrl: ""
  # SMTP — required for email alerts, weekly digest, and notifications (all optional — omit to disable)
  smtpHost: ""
  smtpPort: 587
  smtpUser: ""
  smtpPass: ""
  alertFromEmail: ""
  # Langfuse — AI observability (optional; tracing is silently disabled when unset)
  langfusePublicKey: ""
  langfuseSecretKey: ""
  langfuseHost: "https://cloud.langfuse.com"

# ── Ingress ──────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  # TLS is strongly recommended for production
  tls: false
  # tlsSecretName: tradeops-tls
  host: tradeops.example.com
  annotations: {}
  # cert-manager.io/cluster-issuer: letsencrypt-prod

# ── Horizontal Pod Autoscaler ─────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ── Service account ──────────────────────────────────────────
serviceAccount:
  create: true
  name: ""

# ── Pod security context (applies to all app containers) ─────
# Runs all containers as non-root user 1000 with dropped capabilities.
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Network Policy ───────────────────────────────────────────
# Restricts pod-to-pod traffic: backend ← ingress-nginx + frontend only;
# postgres ← backend only. Requires a CNI plugin that supports NetworkPolicy.
networkPolicy:
  enabled: false

# ── Pod Disruption Budget ─────────────────────────────────────
# Ensures at least 1 backend replica is available during voluntary disruptions.
# Set enabled: true when backend.replicas >= 2.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── Pod Anti-Affinity ─────────────────────────────────────────
# Prefer scheduling backend pods on different nodes for HA.
podAntiAffinity:
  enabled: false
