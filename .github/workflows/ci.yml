name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradeops-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradeops-frontend

jobs:
  # ── Detect version from CHANGELOG ────────────────────────────────────────
  version:
    name: Detect Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
      release_exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract latest version from CHANGELOG
        id: extract
        run: |
          VERSION=$(grep -m1 '^## \[[0-9]' CHANGELOG.md | sed 's/## \[\([^]]*\)\].*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.extract.outputs.version }}" &>/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.extract.outputs.version }} already exists — skipping release creation"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.extract.outputs.version }} does not exist — will create after CI passes"
          fi

  # ── Backend: tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  # ── Backend: build & push Docker image ───────────────────────────────────
  backend-docker:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    needs: [version, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ needs.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend: type-check ──────────────────────────────────────────────────
  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

  # ── Frontend: build & push Docker image ──────────────────────────────────
  frontend-docker:
    name: Frontend Docker Image
    runs-on: ubuntu-latest
    needs: [version, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=${{ needs.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub release (only when version is new) ─────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, backend-docker, frontend-docker]
    # Runs only on main push, after both Docker builds succeed, and only if
    # this version has not been released yet. backend-docker and frontend-docker
    # are skipped on PRs, which implicitly skips this job on PRs too.
    if: needs.version.outputs.release_exists == 'false'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the block between the first versioned heading and the second.
          # [Unreleased] is skipped because it does not start with a digit.
          NOTES=$(awk '
            /^## \[[0-9]/ { n++; if (n==1) { p=1; next } if (n==2) { exit } }
            p && !/^---$/ { print }
          ' CHANGELOG.md)
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" \
            -m "Release ${{ needs.version.outputs.tag }}" || true
          git push origin "${{ needs.version.outputs.tag }}" || true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.notes }}"
