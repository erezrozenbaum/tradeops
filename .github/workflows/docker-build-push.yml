name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradeops-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradeops-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the image tag back to the repo
      packages: write       # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Update Helm values with new image tag (GitOps / ArgoCD) ──────────
      - name: Update Helm image tags
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          sed -i "s|tag: .*  # auto-updated by CI|tag: ${TAG}  # auto-updated by CI|g" helm/tradeops/values.yaml || true
          # Use yq if available for precision; fall back to sed
          if command -v yq &>/dev/null; then
            yq e ".backend.image.tag = \"${TAG}\"" -i helm/tradeops/values.yaml
            yq e ".frontend.image.tag = \"${TAG}\"" -i helm/tradeops/values.yaml
          fi

      - name: Commit updated Helm values
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image tags to ${{ steps.tag.outputs.tag }} [skip ci]"
          file_pattern: helm/tradeops/values.yaml
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
